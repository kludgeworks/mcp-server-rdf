# $schema https://mise.jdx.dev/schema/mise.json

[tools]
java = "graalvm-community-25"
hk = "latest"
pkl = "latest"
"github:google/google-java-format" = "latest"
uv = "latest"
actionlint = "latest"
yamlfmt = "latest"

[env]
HK_MISE = true

[hooks]
postinstall = "hk install --mise"

[settings]
env_cache = true
experimental = true

[tasks.lint]
description = "Run hk validation checks configured for the project"
run = "hk check"

[tasks.fix]
description = "Apply hk automatic fixes configured for the project"
run = "hk fix"

[tasks.build]
description = "run Maven lifecycle goals"
tools = { usage = "latest" }
alias = "b"
shell = "bash -c"
usage = '''
arg "[goals]..." {
  choices "validate" "compile" "test" "package" "verify" "install" "deploy" "native:compile" "spring-boot:run" "spring-boot:build-image"
}
flag "-c --clean" help="run clean before the selected goal"
flag "-s --skip-tests" help="set -DskipTests"
flag "-p --profile <profile>" {
  choices "native" "nativeTest"
}
flag "--native-image-name <name>" help="set -Dnative.image.name for native builds"
'''
run = '''
MVN_ARGS=()

if [ "${usage_skip_tests:-false}" = "true" ]; then
  MVN_ARGS+=("-DskipTests")
fi

if [ "${usage_clean:-false}" = "true" ]; then
  MVN_ARGS+=("clean")
fi

if [ -n "${usage_profile:-}" ]; then
  MVN_ARGS+=("-P${usage_profile}")
fi

if [ -n "${usage_native_image_name:-}" ]; then
  MVN_ARGS+=("-Dnative.image.name=${usage_native_image_name}")
fi

if [ -n "${usage_goals:-}" ]; then
  eval "GOALS=(${usage_goals:-})"
  MVN_ARGS+=("${GOALS[@]}")
else
  MVN_ARGS+=("package")
fi

./mvnw "${MVN_ARGS[@]}"
'''

[tasks."release:tag"]
description = "create the next semantic version tag"
tools = { svu = "latest", usage = "latest" }
alias = "tag"
usage = '''
arg "[bump]" {
  choices "next" "patch" "minor" "major"
  default "next"
  env "RELEASE_BUMP"
}
flag "-n --dry-run" help="print the next version without creating a tag" env="RELEASE_DRY_RUN"
flag "--push" help="push created tag to origin" env="RELEASE_PUSH"
'''
run = '''
BUMP="${usage_bump:-next}"
CURRENT_TAG="$(svu current)"
NEXT_TAG="$(svu "$BUMP")"

if [ "$CURRENT_TAG" = "$NEXT_TAG" ]; then
  case "$BUMP" in
    next)
      printf '\033[33mNo semantic versioning changes detected\033[0m\n' >&2
      ;;
    *)
      printf '\033[33mComputed next tag %s matches current tag %s\033[0m\n' \
        "$NEXT_TAG" "$CURRENT_TAG" >&2
      ;;
  esac
  exit 0
fi

if [ "${usage_dry_run:-false}" = "true" ]; then
  printf '\033[32mNext tag: %s\033[0m\n' "$NEXT_TAG" >&2
  exit 0
fi

git tag -s "$NEXT_TAG" -m "Release $NEXT_TAG"
echo "Created tag $NEXT_TAG"
if [ "${usage_push:-false}" = "true" ]; then
  git push origin "$NEXT_TAG"
  echo "Pushed tag $NEXT_TAG to origin"
fi
'''

[shell_alias]
build = "mise run build"
build-test = "mise run build test"
build-package = "mise run build package"
build-native = "mise run build --profile native native:compile"
build-native-test = "mise run build --profile nativeTest test"
docker-build = "mise run docker:build"
docker-install-log = "mise run docker:install-log"
docker-shell = "mise run docker:shell"
release-tag = "mise run release:tag"
run = "mise run build spring-boot:run"
