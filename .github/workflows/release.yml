name: Release
run-name: Release ${{ github.ref_name }}
on:
  push:
    tags:
      - 'v*'
concurrency:
  group: release
  cancel-in-progress: true
permissions:
  contents: write
  packages: write
jobs:
  extract-version:
    name: Extract Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Resolve version
        id: vars
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
  assemble:
    needs: [extract-version]
    uses: ./.github/workflows/reusable-assemble.yml
    with:
      project-version: ${{ needs.extract-version.outputs.version }}
    secrets: inherit
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [extract-version, assemble]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Download assembled artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifact-*
          path: artifacts
      - name: Download container digests
        uses: actions/download-artifact@v8
        with:
          pattern: container-digest-*
          path: container-digests
      - name: Generate GitHub App token for Homebrew tap
        id: app-token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ vars.KLUDGEWORKS_SPARQL_ID }}
          private-key: ${{ secrets.KLUDGEWORKS_SPARQL_PRIVATE_KEY }}
          owner: kludgeworks
          repositories: homebrew-tap
          permission-contents: write
          permission-metadata: read
      - name: Version & Tag
        uses: jreleaser/release-action@v2
        with:
          setup-java: false
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ needs.extract-version.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Promote Linux container images by digest
        shell: bash
        run: |
          amd64_digest="$(cat container-digests/container-digest-linux-amd64/digest-linux-amd64.txt)"
          arm64_digest="$(cat container-digests/container-digest-linux-arm64/digest-linux-arm64.txt)"

          docker buildx imagetools create \
            --tag ghcr.io/kludgeworks/sparql-mcp:${{ needs.extract-version.outputs.version }}-linux-amd64 \
            ghcr.io/kludgeworks/sparql-mcp@"${amd64_digest}"

          docker buildx imagetools create \
            --tag ghcr.io/kludgeworks/sparql-mcp:${{ needs.extract-version.outputs.version }}-linux-arm64 \
            ghcr.io/kludgeworks/sparql-mcp@"${arm64_digest}"
      - name: Create Linux multi-arch manifest
        shell: bash
        run: |
          amd64_digest="$(cat container-digests/container-digest-linux-amd64/digest-linux-amd64.txt)"
          arm64_digest="$(cat container-digests/container-digest-linux-arm64/digest-linux-arm64.txt)"

          docker buildx imagetools create \
            --tag ghcr.io/kludgeworks/sparql-mcp:${{ needs.extract-version.outputs.version }} \
            ghcr.io/kludgeworks/sparql-mcp@"${amd64_digest}" \
            ghcr.io/kludgeworks/sparql-mcp@"${arm64_digest}"
      - name: Inspect Linux multi-arch manifest
        run: docker buildx imagetools inspect ghcr.io/kludgeworks/sparql-mcp:${{ needs.extract-version.outputs.version }}
      - name: Delete temporary container tags
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMP_TAG_PREFIX: tmp-${{ github.run_id }}-${{ github.run_attempt }}-
        run: |
          gh api --paginate /orgs/kludgeworks/packages/container/sparql-mcp/versions \
            --jq '.[] | select(any(.metadata.container.tags[]?; startswith(env.TEMP_TAG_PREFIX))) | .id' |
          while read -r version_id; do
            if [ -n "${version_id}" ]; then
              gh api -X DELETE "/orgs/kludgeworks/packages/container/sparql-mcp/versions/${version_id}"
            fi
          done
      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
