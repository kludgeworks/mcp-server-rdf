name: Release
run-name: Release ${{ github.ref_type == 'tag' && github.ref_name || format('manual-{0}', github.run_number) }}
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump strategy
        required: true
        default: next
        type: choice
        options:
          - next
          - patch
          - minor
          - major
      dry_run:
        description: Dry run
        required: true
        default: true
        type: boolean
permissions:
  contents: write
  packages: write
jobs:
  precheck:
    name: Precheck
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.version }}
      dry_run: ${{ steps.vars.outputs.dry_run }}
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.KLUDGEWORKS_SPARQL_ID }}
          private-key: ${{ secrets.KLUDGEWORKS_SPARQL_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || github.ref }}
          fetch-depth: 0
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          mise-install: "false"
      - name: Resolve bot user ID
        id: bot-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          user_id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq '.id')
          echo "id=${user_id}" >> "$GITHUB_OUTPUT"
      - name: Configure git
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email \
            "${{ steps.bot-user.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git config commit.gpgsign false
          git config tag.gpgsign false
      - name: Resolve version
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRY_RUN="${{ github.event.inputs.dry_run }}"
            VERSION="$(
              RELEASE_BUMP="${{ github.event.inputs.bump }}" \
              RELEASE_DRY_RUN=true \
              mise run -q release:tag | tail -n1 | tr -d '\r'
            )"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            DRY_RUN="false"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
      - name: Create release tag
        if: github.event_name == 'workflow_dispatch' && steps.vars.outputs.dry_run == 'false'
        shell: bash
        run: |
          RELEASE_BUMP="${{ github.event.inputs.bump }}" \
          RELEASE_NO_SIGN=true \
          mise run -q release:tag
          git push origin --tags
      - name: Generate changelog preview
        id: changelog
        if: github.event_name == 'workflow_dispatch' && steps.vars.outputs.dry_run == 'true'
        uses: jreleaser/release-action@v2
        with:
          setup-java: false
          arguments: changelog --dry-run
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.vars.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Add dry run summary
        if: github.event_name == 'workflow_dispatch' && steps.vars.outputs.dry_run == 'true'
        shell: bash
        run: |
          cat out/jreleaser/release/CHANGELOG.md
          sed -E "1s/^#+ .*/# CHANGELOG PREVIEW v${{ steps.vars.outputs.version }}/" \
            out/jreleaser/release/CHANGELOG.md >> "$GITHUB_STEP_SUMMARY"
  assemble:
    if: needs.precheck.outputs.dry_run == 'false'
    needs: [precheck]
    uses: ./.github/workflows/reusable-assemble.yml
    with:
      project-version: ${{ needs.precheck.outputs.version }}
    secrets: inherit
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [precheck, assemble]
    if: needs.precheck.outputs.dry_run == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Download assembled artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifact-*
          path: artifacts
      - name: Download container digests
        uses: actions/download-artifact@v8
        with:
          pattern: container-digest-*
          path: container-digests
      - name: Generate GitHub App token for Homebrew tap
        id: app-token
        uses: actions/create-github-app-token@v3.0.0
        with:
          app-id: ${{ vars.KLUDGEWORKS_SPARQL_ID }}
          private-key: ${{ secrets.KLUDGEWORKS_SPARQL_PRIVATE_KEY }}
          owner: kludgeworks
          repositories: homebrew-tap
          permission-contents: write
          permission-metadata: read
      - name: Version & Tag
        uses: jreleaser/release-action@v2
        with:
          setup-java: false
          arguments: full-release
        env:
          JRELEASER_PROJECT_VERSION: ${{ needs.precheck.outputs.version }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_HOMEBREW_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Promote Linux container images by digest
        shell: bash
        run: |
          amd64_digest="$(cat container-digests/container-digest-linux-amd64/digest-linux-amd64.txt)"
          arm64_digest="$(cat container-digests/container-digest-linux-arm64/digest-linux-arm64.txt)"

          docker buildx imagetools create \
            --tag ghcr.io/kludgeworks/sparql-mcp:${{ needs.precheck.outputs.version }}-linux-amd64 \
            ghcr.io/kludgeworks/sparql-mcp@"${amd64_digest}"

          docker buildx imagetools create \
            --tag ghcr.io/kludgeworks/sparql-mcp:${{ needs.precheck.outputs.version }}-linux-arm64 \
            ghcr.io/kludgeworks/sparql-mcp@"${arm64_digest}"
      - name: Create Linux multi-arch manifest
        shell: bash
        run: |
          amd64_digest="$(cat container-digests/container-digest-linux-amd64/digest-linux-amd64.txt)"
          arm64_digest="$(cat container-digests/container-digest-linux-arm64/digest-linux-arm64.txt)"

          docker buildx imagetools create \
            --tag ghcr.io/kludgeworks/sparql-mcp:${{ needs.precheck.outputs.version }} \
            ghcr.io/kludgeworks/sparql-mcp@"${amd64_digest}" \
            ghcr.io/kludgeworks/sparql-mcp@"${arm64_digest}"
      - name: Inspect Linux multi-arch manifest
        run: docker buildx imagetools inspect ghcr.io/kludgeworks/sparql-mcp:${{ needs.precheck.outputs.version }}
      - name: Delete temporary container tags
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEMP_TAG_PREFIX: tmp-${{ github.run_id }}-${{ github.run_attempt }}-
        run: |
          gh api --paginate /orgs/kludgeworks/packages/container/sparql-mcp/versions \
            --jq '.[] | select(any(.metadata.container.tags[]?; startswith(env.TEMP_TAG_PREFIX))) | .id' |
          while read -r version_id; do
            if [ -n "${version_id}" ]; then
              gh api -X DELETE "/orgs/kludgeworks/packages/container/sparql-mcp/versions/${version_id}"
            fi
          done
      - name: Upload JReleaser logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
