name: CI Windows
on:
  push:
    branches:
      - '**'
  pull_request:
jobs:
  test:
    name: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true
          install: false
      - name: Install mise tools
        env:
          MISE_LOG_LEVEL: trace
          MISE_JOBS: 1
        run: mise install
      - name: Cache Maven
        id: cache-m2
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
            ~/.m2/mvnd
          key: ${{ runner.os }}-${{ runner.arch }}-m2-${{ hashFiles('**/pom.xml', '.mvn/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-m2-
      - name: Run tests
        run: |
          mise version
          mise run build test
      - name: Run native tests
        run: mise run build --profile nativeTest test
