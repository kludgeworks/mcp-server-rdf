name: CI
on:
  push:
    branches:
      - '**'
  pull_request:
jobs:
  test:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        run: |
          mise version
          mise run build test
      - name: Run native tests
        run: mise run build --profile nativeTest test
