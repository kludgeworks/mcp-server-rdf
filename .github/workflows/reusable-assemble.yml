name: Assemble
on:
  workflow_call:
    inputs:
      project-version:
        required: true
        type: string
permissions:
  contents: read
  packages: write
jobs:
  jar:
    name: Build release jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build release jar
        run: mise run build --skip-tests package
      - name: Upload release jar
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: artifact-jar
          path: target/sparql-mcp-${{ inputs.project-version }}.jar
          if-no-files-found: error
  assemble:
    name: Assemble ${{ matrix.platform }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            native_image_name: sparql-mcp-linux-x86_64
          - os: ubuntu-24.04-arm
            platform: linux-aarch_64
            native_image_name: sparql-mcp-linux-aarch_64
          - os: macos-latest
            platform: osx-aarch_64
            native_image_name: sparql-mcp-osx-aarch_64
          - os: windows-latest
            platform: windows-x86_64
            native_image_name: sparql-mcp-windows-x86_64
          - os: windows-11-arm
            platform: windows-aarch_64
            native_image_name: sparql-mcp-windows-aarch_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: mise run build --clean --profile native --native-image-name "${{ matrix.native_image_name }}" native:compile
      - name: Prepare archive input
        shell: bash
        run: |
          src="target/${{ matrix.native_image_name }}"
          dest="target/release/sparql-mcp"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            src="${src}.exe"
            dest="${dest}.exe"
          fi

          mkdir -p target/release
          cp "$src" "$dest"
      - name: Assemble native archive
        uses: jreleaser/release-action@v2
        with:
          setup-java: false
          arguments: assemble
        env:
          JRELEASER_PROJECT_VERSION: ${{ inputs.project-version }}
      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: artifact-${{ matrix.platform }}
          path: out/jreleaser/assemble/sparqlMcp/archive/*.zip
          if-no-files-found: error
  container:
    name: Publish container ${{ matrix.image_tag }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            image_tag: linux-amd64
          - os: ubuntu-24.04-arm
            image_tag: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install pack
        uses: buildpacks/github-actions/setup-pack@v5.11.0
      - name: Set temporary image reference
        shell: bash
        run: echo "TEMP_IMAGE=ghcr.io/kludgeworks/sparql-mcp:tmp-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.image_tag }}" >> "$GITHUB_ENV"
      - name: Build and publish image with pack
        run: |
          pack build "${TEMP_IMAGE}" \
            --path . \
            --builder paketobuildpacks/ubuntu-noble-builder \
            --env BP_MAVEN_ACTIVE_PROFILES=native \
            --env BP_NATIVE_IMAGE=true \
            --publish
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Capture image digest
        shell: bash
        run: |
          digest="$(docker buildx imagetools inspect "${TEMP_IMAGE}" | awk '/Digest:/ { print $2; exit }')"
          printf '%s\n' "${digest}" > "digest-${{ matrix.image_tag }}.txt"
      - name: Upload image digest
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: container-digest-${{ matrix.image_tag }}
          path: digest-${{ matrix.image_tag }}.txt
          if-no-files-found: error
