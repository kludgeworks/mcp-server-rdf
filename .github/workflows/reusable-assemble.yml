name: Assemble
on:
  workflow_call:
    inputs:
      project-version:
        required: true
        type: string
jobs:
  assemble:
    name: Assemble ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            archive_platform: linux-x64
            native_image_name: sparql-mcp-linux-x86_64
            binary_source: sparql-mcp-linux-x86_64
            executable_name: sparql-mcp
          - os: ubuntu-24.04-arm
            platform: linux-aarch_64
            archive_platform: linux-aarch64
            native_image_name: sparql-mcp-linux-aarch_64
            binary_source: sparql-mcp-linux-aarch_64
            executable_name: sparql-mcp
          - os: macos-latest
            platform: osx-aarch_64
            archive_platform: osx-aarch64
            native_image_name: sparql-mcp-osx-aarch_64
            binary_source: sparql-mcp-osx-aarch_64
            executable_name: sparql-mcp
          - os: windows-latest
            platform: windows-x86_64
            archive_platform: windows-x64
            native_image_name: sparql-mcp-windows-x86_64
            binary_source: sparql-mcp-windows-x86_64.exe
            executable_name: sparql-mcp.exe
    runs-on: ${{ matrix.os }}
    env:
      MISE_HTTP_TIMEOUT: 90s
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cache: true
      - name: Cache Maven
        id: cache-m2
        uses: actions/cache@v5
        with:
          path: |
            ~/.m2/repository
            ~/.m2/wrapper
            ~/.m2/mvnd
          key: ${{ runner.os }}-${{ runner.arch }}-m2-${{ hashFiles('**/pom.xml', '.mvn/**') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-m2-
      - name: Build
        run: mise run build --clean --profile native --native-image-name "${{ matrix.native_image_name }}" native:compile
      - name: Prepare archive input
        shell: bash
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.binary_source }}" "target/release/${{ matrix.executable_name }}"
      - name: Assemble native archive
        uses: jreleaser/release-action@v2
        with:
          setup-java: false
          arguments: assemble
        env:
          JRELEASER_PROJECT_VERSION: ${{ inputs.project-version }}
      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          retention-days: 1
          name: artifact-${{ matrix.platform }}
          path: out/jreleaser/assemble/sparqlMcp/archive/sparql-mcp-${{ inputs.project-version }}-${{ matrix.archive_platform }}.zip
          if-no-files-found: error
