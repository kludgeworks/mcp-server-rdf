project:
  name: mcp.sparql
  description: MCP server to query SPARQL servers
  stereotype: CLI
  languages:
    java:
      version: 25
      groupId: com.kludgeworks
      artifactId: sparql-mcp
      mainClass: com.kludgeworks.mcp.sparql.Application

platform:
  replacements:
    aarch_64: aarch64
    x86_64: x64

release:
  github:
    owner: kludgeworks
    name: mcp.sparql
    overwrite: true
    draft: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits

catalog:
  sbom:
    cyclonedx:
      active: ALWAYS
      distributions: true
      files: true
      formats:
        - JSON

assemble:
  nativeImage:
    sparql-mcp:
      active: ALWAYS
      imageName: sparql-mcp
      archiving:
        enabled: true
      mainJar:
        path: target/sparql-mcp-{{projectVersion}}.jar

