project:
  name: mcp.sparql
  description: MCP server to query SPARQL servers
  copyright: 2025-present Tim Sparg
  license: Apache-2.0
  authors:
    - "@timothysparg"
  links:
    homepage: https://github.com/kludgeworks/mcp-server-rdf
    documentation: https://github.com/kludgeworks/mcp-server-rdf
  stereotype: CLI
  languages:
    java:
      version: 25
      groupId: com.kludgeworks
      artifactId: sparql-mcp
      mainClass: com.kludgeworks.mcp.sparql.Application

platform:
  replacements:
    aarch_64: aarch64
    x86_64: x64

release:
  github:
    owner: kludgeworks
    name: mcp-server-rdf
    overwrite: true
    draft: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits

catalog:
  sbom:
    cyclonedx:
      active: ALWAYS
      distributions: true
      files: true
      formats:
        - JSON

distributions:
  sparql-mcp:
    type: BINARY
    artifacts:
      - path: artifacts/artifact-linux-x86_64/sparql-mcp
        platform: linux-x86_64
        extraProperties:
          graalVMNativeImage: true
      - path: artifacts/artifact-linux-aarch_64/sparql-mcp
        platform: linux-aarch_64
        extraProperties:
          graalVMNativeImage: true
      - path: artifacts/artifact-osx-aarch_64/sparql-mcp
        platform: osx-aarch_64
        extraProperties:
          graalVMNativeImage: true
      - path: artifacts/artifact-windows-x86_64/sparql-mcp.exe
        platform: windows-x86_64
        extraProperties:
          graalVMNativeImage: true

