project:
  name: mcp.sparql
  description: MCP server to query SPARQL servers
  copyright: 2025-present Tim Sparg
  license: Apache-2.0
  authors:
    - "@timothysparg"
  links:
    homepage: https://github.com/kludgeworks/mcp-server-rdf
    documentation: https://github.com/kludgeworks/mcp-server-rdf
  stereotype: CLI
  languages:
    java:
      version: 25
      groupId: com.kludgeworks
      artifactId: sparql-mcp
      mainClass: com.kludgeworks.mcp.sparql.Application
platform:
  replacements:
    aarch_64: aarch64
    x86_64: x64
release:
  github:
    owner: kludgeworks
    name: mcp-server-rdf
    overwrite: true
    changelog:
      formatted: ALWAYS
      preset: conventional-commits
      contributors:
        format: "- {{contributorName}}{{#contributorUsernameAsLink}} ({{.}}){{/contributorUsernameAsLink}}"
catalog:
  sbom:
    cyclonedx:
      active: ALWAYS
      distributions: true
      files: true
      formats:
        - JSON
assemble:
  archive:
    sparqlMcp:
      active: NEVER
      exported: false
      distributionType: BINARY
      attachPlatform: true
      formats:
        - ZIP
      archiveName: sparql-mcp-{{projectVersion}}
      fileSets:
        - input: .
          includes:
            - LICENSE
            - README.md
        - input: target/release
          output: bin
          includes:
            - sparql-mcp
            - sparql-mcp.exe
files:
  artifacts:
    - path: target/sparql-mcp-{{projectVersion}}.jar
distributions:
  sparql-mcp:
    type: BINARY
    extraProperties:
      graalVMNativeImage: true
    artifacts:
      - path: artifacts/artifact-linux-x86_64/sparql-mcp-{{projectVersion}}-linux-x64.zip
        platform: linux-x86_64
      - path: artifacts/artifact-linux-aarch_64/sparql-mcp-{{projectVersion}}-linux-aarch64.zip
        platform: linux-aarch_64
      - path: artifacts/artifact-osx-aarch_64/sparql-mcp-{{projectVersion}}-osx-aarch64.zip
        platform: osx-aarch_64
      - path: artifacts/artifact-windows-x86_64/sparql-mcp-{{projectVersion}}-windows-x64.zip
        platform: windows-x86_64

